<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagar Kumar</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <script src="js/index.js"></script>
</head>

<body>

    <div id="scrollBtnCtn">
        <button id="scrollToTop" type="button" onclick="ScrollToTopButton()">
            <span class="bi bi-chevron-up"></span>
        </button>
        <svg class="scrollRing" viewBox="0 0 100 100">
            <circle id="scrollProgress" cx="50" cy="50" r="48" />
        </svg>
    </div>


    <header>
        <div>
            <span class="bi-brandlogo"></span>
        </div>
        <div>
            <div class="ham-ico">
                <button class="ham" onclick="HamBurgerClick()">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
            </div>
            <ul>
                <li><a href="#work"></a>Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#project">Projects</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="http://">Contact</a></li>
            </ul>
        </div>

    </header>
    <main>
        <section id="landing"></section>
        <section id="work"></section>
        <section id="about"></section>
        <section id="project" class="sizeX boxProject">
            <h1 class="heading">Get in touch</h1>
            <h2 class="subHeading">Latest Blogs</h2>
            <div id="projectContainer"></div>
        </section>

        <section id="blog" class="sizeX shadowBox">
            <h1 class="heading">Blog</h1>
            <h2 class="subHeading">Latest Blogs</h2>
            <div id="blogContainer"></div>
        </section>

        <section class="sizeX shadowBox">
            <h1 class="heading">Get in touch</h1>
            <div class="contact">
                <div class="left-contact">
                    <h2 class="subHeading">Let's Collaborate</h2>
                    <ul class="social-container">
                        <li class="social-buttons"><a href="https://x.com/S4g4rkumar" target="_blank"><span
                                    class="ico bi-twitter-x"></span>
                            </a></li>
                        <li class="social-buttons"><a href="discordapp.com/users/609782153097773069"
                                target="_blank"><span class="ico bi-discord"></span>

                            </a></li>
                        <li class="social-buttons"><a href="https://www.linkedin.com/in/s4g4rkumar/"
                                target="_blank"><span class="ico bi-linkedin"></span>

                            </a></li>
                        <li class="social-buttons"><a href="https://www.instagram.com/s4g4rkumar/" target="_blank"><span
                                    class="ico bi-instagram"></span>

                            </a></li>
                        <li class="social-buttons"><a href="https://steamcommunity.com/id/Ghost_47_cs/"
                                target="_blank"><span class="ico bi-steam"></span>

                            </a></li>
                        <li class="social-buttons"><a href="" target="_blank"><span class="ico bi-skype"></span>

                            </a></li>

                    </ul>
                </div>
                <div>
                    <form id="contact-form" onsubmit="submitForm(event)">
                        <div class="name-group">
                            <input type="text" id="firstName" name="firstName" placeholder="First Name">
                            <input type="text" id="lastName" name="lastName" placeholder="Last Name">
                        </div>
                        <input type="email" id="email" name="email" required placeholder="Email">
                        <input type="text" id="subject" name="subject" required placeholder="Subject">
                        <textarea id="message" name="message" rows="10" required placeholder="Message"></textarea>
                        <button class="submitBtn" type="submit">Send Message</button>
                    </form>
                </div>
            </div>

        </section>

    </main>
    <footer>
        <p class="copy-right"><span class="bi-c-circle"> Created by Sagar Kumar</span></p>
    </footer>








</body>

</html>
